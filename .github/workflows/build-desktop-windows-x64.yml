name: Build Cockpitdecks Desktop Windows x64

on:
  workflow_dispatch:
    inputs:
      build_label:
        description: "Artifact label suffix (e.g. test-windows)"
        required: true
        default: manual
        type: string

permissions:
  contents: read

concurrency:
  group: cockpitdecks-desktop-windows-x64-${{ github.event.inputs.build_label }}
  cancel-in-progress: false

jobs:
  build-only:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout cockpitdecks-desktop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build tag
        env:
          MANUAL_BUILD_LABEL: ${{ github.event.inputs.build_label }}
        run: |
          set -euo pipefail
          BUILD_LABEL="${MANUAL_BUILD_LABEL:-manual}"
          BUILD_ID="manual-${BUILD_LABEL}-${GITHUB_RUN_ID}"
          echo "BUILD_ID=${BUILD_ID}" >> "${GITHUB_ENV}"
          {
            echo "### Desktop Windows build configuration"
            echo
            echo "- build id: \`${BUILD_ID}\`"
            echo "- runner architecture: \`${PROCESSOR_ARCHITECTURE:-unknown}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build desktop app
        run: |
          set -euo pipefail
          uv run pyinstaller --clean packaging/pyinstaller/desktop.spec

      - name: Verify desktop app
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/cockpitdecks-desktop/cockpitdecks-desktop.exe")) { throw "dist/cockpitdecks-desktop/cockpitdecks-desktop.exe not found" }

      - name: Stage build artifact
        shell: pwsh
        run: |
          $artifactBase = "cockpitdecks-desktop-windows-x64-$env:BUILD_ID"
          Remove-Item -Recurse -Force $artifactBase -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $artifactBase | Out-Null
          Copy-Item "dist/cockpitdecks-desktop/*" $artifactBase -Recurse -Force
          $exeHash = (Get-FileHash "$artifactBase/cockpitdecks-desktop.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$exeHash *cockpitdecks-desktop.exe" | Set-Content "$artifactBase/cockpitdecks-desktop.exe.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cockpitdecks-desktop-windows-x64-${{ env.BUILD_ID }}
          path: cockpitdecks-desktop-windows-x64-${{ env.BUILD_ID }}
