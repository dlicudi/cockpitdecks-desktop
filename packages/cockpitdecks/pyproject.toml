# ###########################################
#
# Project
#
[project]
name = "cockpitdecks"

authors = [
  { name="Pierre M.", email="pierre@devleaks.be" },
  { name="Duane Licudi", email="dlicudi@gmail.com" }
]

description = "Decks and web decks to X-Plane Cockpit"

readme = "README.md"

license = {file = "LICENCE"}

classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Games/Entertainment :: Simulation",
]

requires-python = ">=3.10,<3.15"

dependencies = [
    "CairoSVG~=2.8.0",
    "Flask~=3.1.0",
    "jsonlines~=4.0.0",
    "packaging~=25.0",
    "pillow~=12.0",
    "py3rtree @ git+https://github.com/drwelby/py3rtree",
    "ruamel.yaml>=0.19.1,<0.20",
    "simple-websocket~=1.1.0",
    "suntime~=1.3",
    "timezonefinder>=6.5,<9",
    "usb-monitor~=1.23"
]

dynamic = [
    "version"
]

[project.optional-dependencies]
# Simulators
xplane = ["cockpitdecks_xp"]
# msfs = ["cockpitdecks_fs @ git+https://github.com/devleaks/cockpitdecks_fs.git"]
# Extensions
weather = ["cockpitdecks_wm"]
toliss = ["cockpitdecks_tl"]
demoext = ["cockpitdecks_ext"]
# Decks
streamdeck = ["cockpitdecks_sd"]
loupedeck = ["cockpitdecks_ld"]
xtouchmini = ["cockpitdecks_bx"]
# For developer only
development = [
    "types-click",
    "types-Flask",
    "types-Jinja2",
    "types-MarkupSafe",
    "types-Pillow",
    "types-requests",
    "types-tabulate",
    "types-Werkzeug"
]


[project.urls]
Homepage = "https://github.com/dlicudi/cockpitdecks-desktop"
Documentation = "https://devleaks.github.io/cockpitdecks-docs/"
Issues = "https://github.com/dlicudi/cockpitdecks-desktop/issues"
Source = "https://github.com/dlicudi/cockpitdecks-desktop"

[project.scripts]
cockpitdecks-cli = "cockpitdecks:start.main"

[tool.uv.sources]
cockpitdecks_xp = { workspace = true }
cockpitdecks_wm = { workspace = true }
cockpitdecks_ext = { workspace = true }
cockpitdecks_sd = { workspace = true }
cockpitdecks_ld = { workspace = true }
cockpitdecks_bx = { workspace = true }
cockpitdecks_tl = { workspace = true }

# ###########################################
#
# Edit
#
[tool.ruff]
line-length = 160

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
]
ignore = []

[tool.black]
line-length = 160

[tool.flake8]
max-line-length = 160

# ###########################################
#
# Build
#
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "cockpitdecks/__init__.py"

[tool.hatch.metadata]
allow-direct-references = true
